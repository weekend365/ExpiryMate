name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Env key parity
        run: pnpm validate:env-parity

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  migrate:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: expirymate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d expirymate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/expirymate?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations
        run: pnpm --filter @expirymate/api exec prisma migrate deploy

      - name: Generate Prisma client
        run: pnpm --filter @expirymate/api exec prisma generate

  build:
    runs-on: ubuntu-latest
    needs: quality
    env:
      GIT_SHA: ${{ github.sha }}
      APP_VERSION: 0.1.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @expirymate/shared build

      - name: Build API
        run: pnpm --filter @expirymate/api build

      - name: Build Admin (production env validation)
        run: pnpm --filter @expirymate/admin build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_API_BASE_URL: https://api.expirymate.app
          PRIVACY_CONTACT_EMAIL: privacy@expirymate.app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Admin Docker fails without build args
        run: |
          set +e
          output="$(docker build \
            --progress=plain \
            --target build \
            -f apps/admin/Dockerfile \
            . 2>&1)"
          status=$?
          set -e
          echo "$output"
          if [ "$status" -eq 0 ]; then
            echo "Expected Admin Docker build to fail without build-args" >&2
            exit 1
          fi
          echo "$output" | grep -q "NEXT_PUBLIC_API_BASE_URL build-arg is required"

      - name: Admin Docker production build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
          tags: expirymate-admin:ci
          build-args: |
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_API_BASE_URL=https://api.expirymate.app
            PRIVACY_CONTACT_EMAIL=privacy@expirymate.app
          cache-from: type=gha
          cache-to: type=gha,mode=max
