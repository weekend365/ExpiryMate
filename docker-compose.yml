services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expirymate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expirymate"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        GIT_SHA: local
        APP_VERSION: 0.1.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/expirymate?schema=public
      NODE_ENV: development
      PORT: 4000
      AUTH_TOKEN_SECRET: local-docker-auth-token-secret-min-32-chars
      AUTH_ALLOW_DEV_FALLBACK: "false"
      CORS_ORIGIN_ADMIN: http://localhost:3000
      CORS_ORIGIN_MOBILE: http://localhost:8081
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
        NEXT_PUBLIC_APP_ENV: development
        PRIVACY_CONTACT_EMAIL: privacy@expirymate.local
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      PRIVACY_CONTACT_EMAIL: privacy@expirymate.local
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/privacy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
